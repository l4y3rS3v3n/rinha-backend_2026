# Worker must run as root to connect to UDS files created by the APIs (also root).
user root;

worker_processes 1;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    keepalive_timeout 65;
    keepalive_requests 100000;
    client_body_timeout 2s;
    client_header_timeout 2s;
    send_timeout 2s;

    tcp_nodelay on;
    tcp_nopush off;
    sendfile off;

    upstream apis {
        server unix:/sockets/api-1.sock;
        server unix:/sockets/api-2.sock;
        keepalive 128;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 default_server backlog=4096;

        location / {
            proxy_pass http://apis;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
