name: publish

# Publishes a Native-AOT linux/amd64 image to GHCR on every semver tag push.
# Tags must match vX.Y.Z — the engine da Rinha rejects :latest (see issue #9).

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # The rinha-provided static dataset is pulled fresh at build time rather
      # than committed to this repo.
      - name: Fetch reference dataset from official rinha repo
        run: |
          git clone --depth 1 https://github.com/zanfranceschi/rinha-de-backend-2026 /tmp/rinha
          mkdir -p resources
          cp /tmp/rinha/resources/references.json.gz resources/
          cp /tmp/rinha/resources/mcc_risk.json resources/
          cp /tmp/rinha/resources/normalization.json resources/

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
